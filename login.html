<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NS Store</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Nosso CSS customizado -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar navbar-expand-lg navbar-dark ns-navbar sticky-top">
    <div class="container">
      <a class="navbar-brand ns-logo" href="index.html">NS<span class="ns-logo-accent">Store</span></a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="catalogo.html">Catálogo</a></li>
          <li class="nav-item"><a class="nav-link" href="servicos.html">Serviços</a></li>
          <li class="nav-item"><a class="nav-link" href="locacao.html">Locação</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3 ns-nav-actions">
          <a href="login.html" class="btn ns-btn-outline active">Entrar</a>
          <a href="carrinho.html" class="ns-cart-icon">
            <i class="bi bi-cart3"></i>
            <span class="ns-cart-badge">0</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ===================== CONTEÚDO ===================== -->
  <main class="ns-auth-page">
    <div class="ns-auth-card">

      <!-- Logo -->
      <div class="text-center mb-4">
        <p class="ns-logo" style="font-size:1.8rem;">NS<span class="ns-logo-accent">Store</span></p>
        <p class="ns-text-muted" style="color:var(--ns-text-muted); font-size:0.9rem;">
          Novidades, Segurança e Bom Preço
        </p>
      </div>

      <!-- Abas -->
      <div class="ns-auth-tabs">
        <button class="ns-auth-tab active" onclick="mostrarAba('login')">Entrar</button>
        <button class="ns-auth-tab" onclick="mostrarAba('cadastro')">Cadastrar</button>
        <button class="ns-auth-tab" onclick="mostrarAba('recuperar')">Esqueci a senha</button>
      </div>

      <!-- ===== ABA: LOGIN ===== -->
      <div id="aba-login" class="ns-auth-form">
        <div class="mb-3">
          <label class="ns-form-label">E-mail</label>
          <input type="email" id="login-email" class="ns-form-input" placeholder="seu@email.com">
        </div>
        <div class="mb-3">
          <label class="ns-form-label">Senha</label>
          <input type="password" id="login-senha" class="ns-form-input" placeholder="••••••••">
        </div>
        <p id="login-erro" class="ns-form-erro"></p>
        <button class="btn ns-btn-primary w-100 mt-2" onclick="login()">
          Entrar
        </button>
        <p class="text-center mt-3" style="color:var(--ns-text-muted); font-size:0.85rem;">
          Não tem conta?
          <a href="#" onclick="mostrarAba('cadastro')" style="color:var(--ns-cyan-light);">Cadastre-se</a>
        </p>
      </div>

      <!-- ===== ABA: CADASTRO ===== -->
      <div id="aba-cadastro" class="ns-auth-form d-none">
        <div class="mb-3">
          <label class="ns-form-label">Nome completo</label>
          <input type="text" id="cadastro-nome" class="ns-form-input" placeholder="Seu nome">
        </div>
        <div class="mb-3">
          <label class="ns-form-label">E-mail</label>
          <input type="email" id="cadastro-email" class="ns-form-input" placeholder="seu@email.com">
        </div>
        <div class="mb-3">
          <label class="ns-form-label">Senha</label>
          <input type="password" id="cadastro-senha" class="ns-form-input" placeholder="Mínimo 6 caracteres">
        </div>
        <p id="cadastro-erro" class="ns-form-erro"></p>
        <button class="btn ns-btn-primary w-100 mt-2" onclick="cadastrar()">
          Criar conta
        </button>
        <p class="text-center mt-3" style="color:var(--ns-text-muted); font-size:0.85rem;">
          Já tem conta?
          <a href="#" onclick="mostrarAba('login')" style="color:var(--ns-cyan-light);">Entrar</a>
        </p>
      </div>

      <!-- ===== ABA: RECUPERAR SENHA ===== -->
      <div id="aba-recuperar" class="ns-auth-form d-none">
        <p style="color:var(--ns-text-muted); font-size:0.9rem; margin-bottom:1.2rem;">
          Digite seu e-mail e enviaremos um link para redefinir sua senha.
        </p>
        <div class="mb-3">
          <label class="ns-form-label">E-mail</label>
          <input type="email" id="recuperar-email" class="ns-form-input" placeholder="seu@email.com">
        </div>
        <p id="recuperar-erro" class="ns-form-erro"></p>
        <p id="recuperar-ok" class="ns-form-ok"></p>
        <button class="btn ns-btn-primary w-100 mt-2" onclick="recuperarSenha()">
          Enviar link de recuperação
        </button>
        <p class="text-center mt-3" style="color:var(--ns-text-muted); font-size:0.85rem;">
          Lembrou a senha?
          <a href="#" onclick="mostrarAba('login')" style="color:var(--ns-cyan-light);">Voltar ao login</a>
        </p>
      </div>

    </div>
  </main>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

  <!-- Firebase Auth (type="module" obrigatório para importar firebase-config.js) -->
  <script type="module" src="js/auth.js"></script>

  <!-- Lógica das abas (não precisa de module) -->
  <script>
    function mostrarAba(aba) {
      document.getElementById("aba-login").classList.add("d-none");
      document.getElementById("aba-cadastro").classList.add("d-none");
      document.getElementById("aba-recuperar").classList.add("d-none");
      document.getElementById("aba-" + aba).classList.remove("d-none");

      document.querySelectorAll(".ns-auth-tab").forEach(btn => btn.classList.remove("active"));
      event.target.classList.add("active");
    }
  </script>
</body>
</html>
